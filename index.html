<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Composte AI — Plateforme Agricole</title>
    <meta name="description" content="Plateforme agricole intelligente pour les producteurs du Congo Brazzaville." />
    <meta name="author" content="Felici PFOUAPO ELENGA" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#022c22" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Composte AI" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Composte AI" />
    <meta property="og:description" content="Plateforme agricole IA pour les producteurs congolais." />
    <meta property="og:type" content="website" />

    <style>
      html, body { overscroll-behavior: none; -webkit-overflow-scrolling: touch; margin: 0; }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      * { touch-action: manipulation; }
      button, [role="button"] { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
      #root:empty::after {
        content: ''; display: block; width: 32px; height: 32px;
        margin: 48vh auto 0; border: 3px solid #064e3b;
        border-top-color: transparent; border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
